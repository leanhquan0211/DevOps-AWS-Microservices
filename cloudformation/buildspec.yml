version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - python --version
      - python -m pip install --upgrade pip
      - python -m pip install "setuptools<81"
      - python -m pip install "cfn-lint==1.47.1"
      - python -m pip install "taskcat==0.9.57"
      - python -c "import pkg_resources; print('pkg_resources OK')"
      - taskcat --version

  pre_build:
    commands:
      - aws --version
      - cfn-lint --version
      - pwd
      - ls -la
      - ls -la cloudformation
      - ls -la cloudformation/templates

  build:
    commands:
      - cfn-lint cloudformation/templates/infrastructure.yaml
      - cd cloudformation
      - pwd
      - cat .taskcat.yml
      - taskcat test run

artifacts:
  files:
    - cloudformation/templates/infrastructure.yaml
    - cloudformation/.taskcat.yml